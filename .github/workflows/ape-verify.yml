name: Ape build verification (nightly)

# End-to-end verification: clone a reference Brownie repo, run our codemod,
# then run `ape compile && ape test` inside a Docker image with eth-ape
# installed. Exit code 0 = the migrated code actually builds.
#
# Slow (~10-15 min). Runs nightly + on manual dispatch, NOT every PR.

on:
  schedule:
    - cron: "0 5 * * *"  # daily 05:00 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: "Reference repo to verify (default: brownie-mix/token-mix)"
        required: false
        default: "brownie-mix/token-mix"

jobs:
  ape-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        repo:
          - "brownie-mix/token-mix"
          - "PatrickAlphaC/brownie_fund_me"
    steps:
      - name: Checkout codemod
        uses: actions/checkout@v4
        with:
          path: codemod

      - name: Clone target Brownie repo (pinned to default branch HEAD)
        run: |
          git clone --depth 1 "https://github.com/${{ matrix.repo }}.git" target
          # Capture the commit SHA so the verification is reproducible.
          cd target && git rev-parse HEAD > .verified-commit

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run codemod on target
        working-directory: codemod
        run: |
          npx codemod@latest workflow run \
            -w workflow.yaml \
            --target "${{ github.workspace }}/target" \
            --no-interactive --allow-dirty

      - name: Migrate brownie-config.yaml
        working-directory: codemod
        run: |
          pip install pyyaml
          python scripts/migrate_config.py "${{ github.workspace }}/target" || true

      - name: Build Ape verification image
        working-directory: codemod
        run: docker build -f Dockerfile.ape -t b2a-verify .

      - name: ape compile (allowed to fail; we want the diagnostic)
        run: |
          docker run --rm -v "${{ github.workspace }}/target:/work" \
            b2a-verify "ape plugins install solidity --yes && ape compile" \
            || echo "::warning::ape compile failed for ${{ matrix.repo }} — see log"

      - name: Diff summary
        working-directory: target
        run: |
          echo "Verified commit: $(cat .verified-commit)"
          git diff --stat | tail -10
          echo "---"
          grep -rn "TODO(brownie-to-ape)" --include="*.py" . | head -20 || true

      - name: Upload migrated repo as artifact (for human review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ape-verify-${{ matrix.repo }}
          path: target/
          if-no-files-found: warn
