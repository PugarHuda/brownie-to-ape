name: External link health (weekly)

# Verify every external URL referenced from markdown / HTML / .md files
# resolves (no 404s, no timeouts, no DNS failures). Catches docs that
# silently rot when external resources move.
#
# Runs weekly + on manual dispatch + on demand via PR comment '/links'.
#
# Lychee is fast, parallel, and respects rate limits per host.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Verbose output, progress bar, accept 200/206/429 (rate-limited)
          # Skip mailto: and known-flaky external services.
          args: >
            --verbose
            --no-progress
            --accept 200,206,429
            --exclude-mail
            --exclude '^https?://localhost'
            --exclude '^https?://127\.0\.0\.1'
            --exclude '^https?://0\.0\.0\.0'
            --exclude '^https?://example\.com'
            --exclude '^https?://app\.codemod\.com/registry/.*'
            --max-redirects 5
            --max-retries 2
            --timeout 30
            --cache
            --max-cache-age 7d
            './**/*.md' './**/*.html'
          fail: false  # warn but don't fail CI — use issue creation
          output: ./lychee/out.md

      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link checker found broken URLs (weekly)"
          content-filepath: ./lychee/out.md
          labels: |
            documentation
            link-rot

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/out.md
          if-no-files-found: ignore
