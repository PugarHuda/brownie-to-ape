name: Publish to Codemod Registry

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Re-run the test suite as a publish gate.
      - name: Run jssg fixture suite
        run: npx codemod@latest jssg test -l python ./scripts/codemod.ts ./tests/fixtures

      - name: Publish via Codemod trusted publisher (OIDC)
        uses: codemod/publish-action@v1
