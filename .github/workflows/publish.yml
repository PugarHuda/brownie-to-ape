name: Publish to Codemod Registry

on:
  push:
    tags:
      - "v*"
  # Allow manual re-runs without re-tagging.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Re-run the test suite as a publish gate.
      - name: Run jssg fixture suite
        run: npx codemod@latest jssg test -l python ./scripts/codemod.ts ./tests/fixtures

      - name: Publish to Codemod Registry
        env:
          CODEMOD_AUTH_TOKEN: ${{ secrets.CODEMOD_API_KEY }}
        run: |
          if [ -z "$CODEMOD_AUTH_TOKEN" ]; then
            echo "::error::CODEMOD_API_KEY secret is not set."
            echo "::error::Generate at https://app.codemod.com/settings/api-keys"
            echo "::error::Add at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          npx codemod@latest publish
