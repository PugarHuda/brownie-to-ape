<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#1a2030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <g opacity="0.18" filter="url(#soft)">
    <circle cx="180" cy="120" r="240" fill="#7c3aed"/>
    <circle cx="1100" cy="540" r="280" fill="#22c55e"/>
  </g>
  <text x="640" y="120" text-anchor="middle" fill="#e6edf3" font-size="44" font-weight="600" letter-spacing="-1">@pugarhuda/brownie-to-ape</text>
  <text x="640" y="170" text-anchor="middle" fill="#9ca3af" font-size="22" font-weight="400">Brownie → ApeWorx Ape · 17-pass jssg codemod</text>
  <line x1="380" y1="210" x2="900" y2="210" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <g transform="translate(0,260)">
    <g transform="translate(140,0)">
      <text x="80" y="0" text-anchor="middle" fill="#22c55e" font-size="64" font-weight="700">250</text>
      <text x="80" y="34" text-anchor="middle" fill="#9ca3af" font-size="16">tests passing</text>
      <text x="80" y="56" text-anchor="middle" fill="#6b7280" font-size="13">90 fixture · 125 Vitest · 35 pytest</text>
    </g>
    <g transform="translate(380,0)">
      <text x="80" y="0" text-anchor="middle" fill="#3b82f6" font-size="64" font-weight="700">5</text>
      <text x="80" y="34" text-anchor="middle" fill="#9ca3af" font-size="16">OSS repos validated</text>
      <text x="80" y="56" text-anchor="middle" fill="#6b7280" font-size="13">incl. Yearn Finance</text>
    </g>
    <g transform="translate(620,0)">
      <text x="80" y="0" text-anchor="middle" fill="#22c55e" font-size="64" font-weight="700">0</text>
      <text x="80" y="34" text-anchor="middle" fill="#9ca3af" font-size="16">false positives</text>
      <text x="80" y="56" text-anchor="middle" fill="#6b7280" font-size="13">audited across all 5 repos</text>
    </g>
    <g transform="translate(860,0)">
      <text x="80" y="0" text-anchor="middle" fill="#7c3aed" font-size="64" font-weight="700">~3s</text>
      <text x="80" y="34" text-anchor="middle" fill="#9ca3af" font-size="16">per repo</text>
      <text x="80" y="56" text-anchor="middle" fill="#6b7280" font-size="13">post-npx warmup</text>
    </g>
  </g>

  <g transform="translate(0,420)">
    <rect x="240" y="0" width="800" height="80" rx="14" fill="#0d1117" stroke="#22c55e" stroke-width="2"/>
    <text x="640" y="32" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="700">✓ ape compile + ape test → 38 passed in 5.40s</text>
    <text x="640" y="58" text-anchor="middle" fill="#9ca3af" font-size="14">on migrated brownie-mix/token-mix · v0.7.7 · MIT</text>
  </g>

  <text x="640" y="560" text-anchor="middle" fill="#6b7280" font-size="14">Codemod Boring AI Hackathon · DoraHacks · 2026</text>
  <text x="640" y="586" text-anchor="middle" fill="#9ca3af" font-size="13">https://github.com/PugarHuda/brownie-to-ape</text>
</svg>
