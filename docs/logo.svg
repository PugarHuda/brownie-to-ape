<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#1a1f2c"/>
    </linearGradient>
    <linearGradient id="brownie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a16207"/>
      <stop offset="1" stop-color="#5c3a0a"/>
    </linearGradient>
    <linearGradient id="ape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a16207"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soft accent glows -->
  <circle cx="120" cy="140" r="160" fill="#a16207" opacity="0.08"/>
  <circle cx="400" cy="380" r="180" fill="#34d399" opacity="0.08"/>

  <!-- Code bracket frame -->
  <g stroke="#3b82f6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <path d="M 96 160 L 76 160 L 76 352 L 96 352"/>
    <path d="M 416 160 L 436 160 L 436 352 L 416 352"/>
  </g>

  <!-- B (Brownie) -->
  <text x="148" y="320" font-size="200" font-weight="800" fill="url(#brownie)" filter="url(#glow)">B</text>

  <!-- Arrow -->
  <g transform="translate(232 232)" filter="url(#glow)">
    <path d="M 0 24 L 48 24 M 38 12 L 50 24 L 38 36" stroke="url(#arrow)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- A (Ape) -->
  <text x="304" y="320" font-size="200" font-weight="800" fill="url(#ape)" filter="url(#glow)">A</text>

  <!-- Tagline -->
  <text x="256" y="408" text-anchor="middle" fill="#9ca3af" font-size="22" font-weight="500" letter-spacing="2">brownie-to-ape</text>
  <text x="256" y="438" text-anchor="middle" fill="#6b7280" font-size="14" font-weight="400" letter-spacing="3">CODEMOD · jssg · 0 FP</text>
</svg>
