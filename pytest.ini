[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Describe* Test*
python_functions = test_*
# Disable eth-ape's pytest plugin — it tries to inject web3/network fixtures
# that conflict with our standalone YAML translator tests, crashing pytest
# during fixture setup. Our tests don't need any Ape runtime.
addopts = -v -p no:ape_test
